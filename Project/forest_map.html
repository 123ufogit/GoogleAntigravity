<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREST WATCH - 全国森林資源メッシュビューア</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- アプリケーション CSS -->
    <link rel="stylesheet" href="forest_map.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="app-container">
        
        <!-- 左側コントロールサイドバー -->
        <aside class="sidebar">
            <!-- ヘッダー -->
            <header class="sidebar-header">
                <h1>🌲FOREST<span>WATCH</span></h1>
                <p>全国森林資源メッシュ-ベクトルタイル (20mメッシュ) を国土地理院の標準地図に重ね合わせた対話型森林データビューア。</p>
            </header>

            <!-- コンテンツエリア -->
            <div class="sidebar-content">
                
                <!-- プリセット・ナビゲーション -->
                <section class="card">
                    <h2><span class="card-icon">📍</span> 美林エリア・ジャンプ</h2>
                    <div class="preset-grid">
                        <button class="preset-btn" data-preset="yoshino">
                            <strong>吉野美林</strong>
                            <span class="location">奈良県吉野町</span>
                        </button>
                        <button class="preset-btn" data-preset="kiso">
                            <strong>木曽ひのき</strong>
                            <span class="location">長野県上松町</span>
                        </button>
                        <button class="preset-btn" data-preset="akita">
                            <strong>秋田スギ</strong>
                            <span class="location">秋田県能代市</span>
                        </button>
                        <button class="preset-btn" data-preset="yanase">
                            <strong>魚梁瀬スギ</strong>
                            <span class="location">高知県馬路村</span>
                        </button>
                    </div>
                </section>

                <!-- マップコントロール設定 -->
                <section class="card">
                    <h2><span class="card-icon">⚙️</span> レイヤー設定</h2>
                    
                    <div class="control-group">
                        <label for="basemap-select">ベースマップ</label>
                        <div class="select-wrapper">
                            <select id="basemap-select">
                                <option value="standard" selected>国土地理院 標準地図</option>
                                <option value="ortho">国土地理院 空中写真</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-group">
                        <label for="opacity-slider">森林メッシュ透過度</label>
                        <div class="slider-container">
                            <input type="range" id="opacity-slider" min="0" max="100" value="80">
                            <span class="slider-val" id="opacity-val">80%</span>
                        </div>
                    </div>
                </section>

                <!-- 樹種凡例 -->
                <section class="card">
                    <h2><span class="card-icon">🏷️</span> 凡例 (森林簿樹種1)</h2>
                    <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 8px;">
                        項目をクリックすると、その樹種のみを強調表示します。
                    </p>
                    <div class="legend-list" id="legend-list">
                        <!-- JSで動的描画 -->
                    </div>
                </section>

                <!-- クリックしたメッシュの属性詳細情報 -->
                <section class="card" id="detail-card">
                    <h2><span class="card-icon">📊</span> メッシュ詳細情報</h2>
                    
                    <div id="detail-placeholder" class="detail-placeholder">
                        <span class="detail-placeholder-icon">🖱️</span>
                        <span>地図上の色つきのメッシュ（Z=13以上）をクリックすると、詳細な森林資源データがここに表示されます。</span>
                    </div>

                    <div id="detail-content" class="detail-content" style="display: none;">
                        <!-- JSで動的描画 -->
                    </div>
                </section>

            </div>

            <!-- フッター -->
            <footer class="sidebar-footer">
                データ提供: <a href="https://www.geospatial.jp/ckan/organization/rinya" target="_blank">林野庁 (G空間情報センター)</a>
            </footer>
        </aside>

        <!-- マップ表示エリア -->
        <main id="map"></main>

        <!-- マップローディング状態インジケータ -->
        <div id="loading-overlay" class="map-loading-overlay">
            <div class="mini-spinner"></div>
            <span>ベクトルタイル読み込み中...</span>
        </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Leaflet.VectorGrid JS (Bundled version, contains protobuf library) -->
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>

    <!-- アプリケーション JS -->
    <script src="forest_map.js"></script>
</body>
</html>
